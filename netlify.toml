[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[edge_functions]]
  path = "/api/battle/stream"
  function = "battle-stream"

[[edge_functions]]
  path = "/api/draft/choice"
  function = "draft-choice"

[[edge_functions]]
  path = "/api/lineup/commentary"
  function = "lineup-commentary"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
